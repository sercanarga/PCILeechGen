name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -count=1 ./...

  release:
    name: Build & Release
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_SHA::8}
          OUTPUT_NAME=pcileechgen-${{ matrix.suffix }}
          go build -trimpath \
            -ldflags "-s -w -X github.com/sercanarga/pcileechgen/internal/version.Version=${VERSION}" \
            -o dist/${OUTPUT_NAME} \
            ./cmd/pcileechgen/

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: pcileechgen-${{ matrix.suffix }}
          path: dist/pcileechgen-${{ matrix.suffix }}

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          git tag "${SHORT_SHA}"
          git push origin "${SHORT_SHA}"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum pcileechgen-* > checksums-sha256.txt

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.short_sha }}
          name: Build ${{ steps.vars.outputs.short_sha }}
          body: |
            Build - `main` branch, commit `${{ github.sha }}`
          files: |
            dist/pcileechgen-*
            dist/checksums-sha256.txt
          make_latest: true

