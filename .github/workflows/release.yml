name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -count=1 ./...

  release:
    name: Build & Release
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_SHA::8}
          OUTPUT_NAME=pcileechgen-${{ matrix.suffix }}
          go build -trimpath \
            -ldflags "-s -w -X github.com/sercanarga/pcileechgen/internal/version.Version=${VERSION}" \
            -o dist/${OUTPUT_NAME} \
            ./cmd/pcileechgen/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcileechgen-${{ matrix.suffix }}
          path: dist/pcileechgen-${{ matrix.suffix }}
          retention-days: 90
