name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${RELEASE_SHA::8}
          OUTPUT_NAME=pcileechgen-${{ matrix.suffix }}
          go build -trimpath \
            -ldflags "-s -w -X github.com/sercanarga/pcileechgen/internal/version.Version=${VERSION}" \
            -o dist/${OUTPUT_NAME} \
            ./cmd/pcileechgen/

      - name: Upload build output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pcileechgen-${{ matrix.suffix }}
          path: dist/pcileechgen-${{ matrix.suffix }}

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create tag
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          SHORT_SHA=${RELEASE_SHA::7}
          git fetch --force --tags origin
          if git rev-parse --verify --quiet "refs/tags/${SHORT_SHA}"; then
            test "$(git rev-list -n 1 "${SHORT_SHA}")" = "${RELEASE_SHA}"
            exit 0
          fi
          git tag "${SHORT_SHA}" "${RELEASE_SHA}"
          git push origin "${SHORT_SHA}"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum pcileechgen-* > checksums-sha256.txt

      - name: Set short SHA
        id: vars
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "short_sha=${RELEASE_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.vars.outputs.short_sha }}
          name: Build ${{ steps.vars.outputs.short_sha }}
          body: |
            Build - `main` branch, commit `${{ github.event.workflow_run.head_sha }}`
          files: |
            dist/pcileechgen-*
            dist/checksums-sha256.txt
          make_latest: true
