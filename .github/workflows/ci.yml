name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Tcl
        run: |
          sudo apt-get update
          sudo apt-get install -y tcl

      - name: Go format check
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

      - name: Go race summary
        run: go test -race ./internal/firmware/nvme ./internal/firmware/svgen

      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version
          shellcheck tests/cocotb/generate_all.sh vfio-user/guest/init vfio-user/guest/probe.sh

      - name: Clang-Tidy behavior sources
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy libcmocka-dev libjson-c-dev libssl-dev
          clang-tidy --version
          cflags="-D_GNU_SOURCE -std=c11 -I vfio-user/include -I/usr/local/include $(pkg-config --cflags cmocka json-c openssl)"
          clang-tidy vfio-user/src/behavior_ahci.c vfio-user/src/behavior_ethernet.c \
            vfio-user/src/behavior_gpu.c vfio-user/src/behavior_hda.c \
            vfio-user/src/behavior_nvme.c vfio-user/src/behavior_static.c \
            vfio-user/src/behavior_xhci.c \
            -checks='-*,clang-analyzer-*' -- $cflags

  hdl-lint:
    name: HDL Lint (Verilator)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator
          verilator --version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build pcileechgen
        run: make build

      - name: Run HDL lint
        run: make hdl-lint

  vfio-user:
    name: VFIO-user behavior tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmocka-dev libjson-c-dev libssl-dev

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate VFIO-user fixtures
        run: |
          go build -trimpath -o bin/pcileechgen ./cmd/pcileechgen
          tests/cocotb/generate_all.sh

      - name: Run VFIO-user tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          make -C vfio-user clean test
          make -C vfio-user clean test SANITIZE='-fsanitize=address,undefined -fno-omit-frame-pointer'
