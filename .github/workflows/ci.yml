name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Tcl
        run: |
          sudo apt-get update
          sudo apt-get install -y tcl

      - name: Go format check
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

  hdl-lint:
    name: HDL Lint (Verilator)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator
          verilator --version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build pcileechgen
        run: make build

      - name: Run HDL lint
        run: make hdl-lint

  vfio-user:
    name: VFIO-user behavior tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmocka-dev libjson-c-dev libssl-dev

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate VFIO-user fixtures
        run: |
          go build -trimpath -o bin/pcileechgen ./cmd/pcileechgen
          tests/cocotb/generate_all.sh

      - name: Run VFIO-user tests
        run: make -C vfio-user clean test
