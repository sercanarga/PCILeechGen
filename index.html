<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCILeechGen - Firmware Generator for PCILeech FPGA Boards</title>
    <meta name="description"
        content="Firmware generator for PCILeech-compatible FPGA boards. Reads a real PCI/PCIe device over VFIO and produces ready-to-build Vivado projects.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
    <style>
        :root {
            --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --theme-color: #42b983;
            --sidebar-width: 260px;
        }

        /* GitHub-style alert boxes */
        .gh-alert {
            padding: 12px 16px;
            margin: 16px 0;
            border-left: 4px solid;
            border-radius: 6px;
        }

        .gh-alert-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .gh-alert-title svg {
            flex-shrink: 0;
        }

        .gh-alert-note {
            border-color: #478be6;
            background: rgba(71, 139, 230, 0.1);
        }

        .gh-alert-tip {
            border-color: #3fb950;
            background: rgba(63, 185, 80, 0.1);
        }

        .gh-alert-important {
            border-color: #a371f7;
            background: rgba(163, 113, 247, 0.1);
        }

        .gh-alert-warning {
            border-color: #d29922;
            background: rgba(210, 153, 34, 0.1);
        }

        .gh-alert-caution {
            border-color: #f85149;
            background: rgba(248, 81, 73, 0.1);
        }

        .gh-alert-note .gh-alert-title {
            color: #478be6;
        }

        .gh-alert-tip .gh-alert-title {
            color: #3fb950;
        }

        .gh-alert-important .gh-alert-title {
            color: #a371f7;
        }

        .gh-alert-warning .gh-alert-title {
            color: #d29922;
        }

        .gh-alert-caution .gh-alert-title {
            color: #f85149;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script>
        // GitHub-style alerts plugin for docsify
        function ghAlertsPlugin(hook) {
            var icons = {
                note: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.5 7.75A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path></svg>',
                tip: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5c-2.363 0-4 1.69-4 3.75 0 .984.424 1.625.984 2.304l.214.253c.223.264.47.556.673.848.284.411.537.896.621 1.49a.75.75 0 0 1-1.484.211c-.04-.282-.163-.547-.37-.847a8.456 8.456 0 0 0-.542-.68c-.084-.1-.173-.205-.268-.32C3.201 7.75 2.5 6.766 2.5 5.25 2.5 2.31 4.863 0 8 0s5.5 2.31 5.5 5.25c0 1.516-.701 2.5-1.328 3.259-.095.115-.184.22-.268.319-.207.245-.383.453-.541.681-.208.3-.33.565-.37.847a.751.751 0 0 1-1.485-.212c.084-.593.337-1.078.621-1.489.203-.292.45-.584.673-.848.075-.088.147-.173.213-.253.561-.679.985-1.32.985-2.304 0-2.06-1.637-3.75-4-3.75ZM5.75 12h4.5a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1 0-1.5ZM6 15.25a.75.75 0 0 1 .75-.75h2.5a.75.75 0 0 1 0 1.5h-2.5a.75.75 0 0 1-.75-.75Z"></path></svg>',
                important: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0 1 14.25 13H8.06l-2.573 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-9.5a.25.25 0 0 0-.25-.25Zm7 2.25v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 9a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"></path></svg>',
                warning: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0 1 14.082 15H1.918a1.75 1.75 0 0 1-1.543-2.575Zm1.763.707a.25.25 0 0 0-.44 0L1.698 13.132a.25.25 0 0 0 .22.368h12.164a.25.25 0 0 0 .22-.368Zm.53 3.996v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"></path></svg>',
                caution: '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4.47.22A.749.749 0 0 1 5 0h6c.199 0 .389.079.53.22l4.25 4.25c.141.14.22.331.22.53v6a.749.749 0 0 1-.22.53l-4.25 4.25A.749.749 0 0 1 11 16H5a.749.749 0 0 1-.53-.22L.22 11.53A.749.749 0 0 1 0 11V5c0-.199.079-.389.22-.53Zm.84 1.28L1.5 5.31v5.38l3.81 3.81h5.38l3.81-3.81V5.31L10.69 1.5ZM8 4a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 4Zm0 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path></svg>'
            };
            var labels = { note: 'Note', tip: 'Tip', important: 'Important', warning: 'Warning', caution: 'Caution' };

            hook.afterEach(function (html) {
                // Match blockquotes that start with [!TYPE]
                return html.replace(/<blockquote>\s*<p>\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*<br\s*\/?>\s*([\s\S]*?)<\/p>\s*<\/blockquote>/gi, function (match, type, content) {
                    var t = type.toLowerCase();
                    return '<div class="gh-alert gh-alert-' + t + '">' +
                        '<p class="gh-alert-title">' + (icons[t] || '') + ' ' + labels[t] + '</p>' +
                        '<p>' + content.trim() + '</p></div>';
                });
            });
        }

        window.$docsify = {
            name: 'PCILeechGen',
            repo: 'https://github.com/sercanarga/PCILeechGen',
            loadSidebar: false,
            subMaxLevel: 1,
            auto2top: true,
            basePath: 'https://raw.githubusercontent.com/sercanarga/PCILeechGen/main/',
            plugins: [ghAlertsPlugin],
            search: {
                placeholder: 'Search',
                noData: 'No results',
                depth: 3
            },
            markdown: {
                renderer: {
                    code: function (code, lang) {
                        if (lang === 'mermaid') {
                            return '<div class="mermaid">' + code + '</div>';
                        }
                        return this.origin.code.apply(this, arguments);
                    }
                }
            }
        };
    </script>
    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        // Re-render mermaid blocks after docsify renders the page
        document.addEventListener('DOMContentLoaded', function () {
            var observer = new MutationObserver(function () {
                mermaid.run({ querySelector: '.mermaid' });
            });
            var target = document.getElementById('app');
            if (target) {
                observer.observe(target, { childList: true, subtree: true });
            }
        });
    </script>
    <!-- Docsify -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <!-- Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>

</html>
