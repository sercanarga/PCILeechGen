linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - errorlint
    - exportloopref
    - nilerr
    - prealloc
    - unconvert
    - unparam
    - wastedassign

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  staticcheck:
    checks: ["all", "-SA1019"]

issues:
  exclude-dirs:
    - lib
    - vendor
  max-issues-per-linter: 50
  max-same-issues: 5
